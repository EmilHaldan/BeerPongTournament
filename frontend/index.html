<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beer Pong Tournament</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🍺 Beer Pong Tournament</h1>
    <nav>
      <button class="tab active" data-tab="scoreboard">Scoreboard</button>
      <button class="tab" data-tab="matches">Matches</button>
      <button class="tab" data-tab="register">Register Score</button>
      <button class="tab" data-tab="teams">Teams</button>
    </nav>
  </header>

  <main>
    <!-- Error banner -->
    <div id="error-banner" class="error-banner hidden"></div>

    <!-- Scoreboard tab -->
    <section id="tab-scoreboard" class="tab-content active">
      <h2>Leaderboard</h2>
      <table id="leaderboard-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Team</th>
            <th>Wins</th>
            <th>Losses</th>
            <th>Total Score</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          <tr><td colspan="5" class="empty-msg">No matches yet</td></tr>
        </tbody>
      </table>
      <button id="refresh-btn" class="btn secondary">Refresh</button>
    </section>

    <!-- Matches tab -->
    <section id="tab-matches" class="tab-content">
      <h2>Match History</h2>
      <table id="matches-table">
        <thead>
          <tr>
            <th>Team 1</th>
            <th>Score</th>
            <th>Score</th>
            <th>Team 2</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="matches-body">
          <tr><td colspan="6" class="empty-msg">No matches yet</td></tr>
        </tbody>
      </table>
      <button id="refresh-matches-btn" class="btn secondary">Refresh</button>
    </section>

    <!-- Register score tab -->
    <section id="tab-register" class="tab-content">
      <h2>Register Match Result</h2>
      <form id="match-form">
        <div class="form-row">
          <div class="form-group">
            <label for="team1_name">Team 1</label>
            <select id="team1_name" name="team1_name" required>
              <option value="" disabled selected>Select a team</option>
            </select>
          </div>
          <div class="form-group">
            <label for="team1_score">Score</label>
            <input type="number" id="team1_score" name="team1_score" required min="0" max="6" value="0" />
          </div>
        </div>
        <div class="versus">VS</div>
        <div class="form-row">
          <div class="form-group">
            <label for="team2_name">Team 2</label>
            <select id="team2_name" name="team2_name" required>
              <option value="" disabled selected>Select a team</option>
            </select>
          </div>
          <div class="form-group">
            <label for="team2_score">Score</label>
            <input type="number" id="team2_score" name="team2_score" required min="0" max="6" value="0" />
          </div>
        </div>
        <button type="submit" class="btn primary">Submit Match</button>
      </form>
      <div id="success-msg" class="success-msg hidden">Match registered! ✓</div>
    </section>

    <!-- Teams tab -->
    <section id="tab-teams" class="tab-content">
      <h2>Registered Teams</h2>
      <table id="teams-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Team Name</th>
            <th>Members</th>
          </tr>
        </thead>
        <tbody id="teams-body">
          <tr><td colspan="3" class="empty-msg">No teams registered yet</td></tr>
        </tbody>
      </table>
      <button id="refresh-teams-btn" class="btn secondary">Refresh</button>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
